<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>ParadigmOS wallpaper — Ripple (light variant): concentric teal and blue arcs radiating from the lower left</title>
  <defs>
    <radialGradient id="bg" cx="0.05" cy="1.05" r="1.4">
      <stop offset="0" stop-color="#D3E8ED"/>
      <stop offset="0.55" stop-color="#C0DCE7"/>
      <stop offset="1" stop-color="#A9CCDE"/>
    </radialGradient>
    <radialGradient id="core" cx="0.02" cy="1.02" r="0.5">
      <stop offset="0" stop-color="#2190A4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2190A4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#core)"/>
  <g fill="none" filter="url(#soft)">
    <circle cx="30" cy="1100" r="280" stroke="#2190A4" stroke-width="30" opacity="0.42"/>
    <circle cx="30" cy="1100" r="470" stroke="#2B5D86" stroke-width="24" opacity="0.34"/>
    <circle cx="30" cy="1100" r="660" stroke="#2190A4" stroke-width="20" opacity="0.27"/>
    <circle cx="30" cy="1100" r="850" stroke="#4A8ABD" stroke-width="18" opacity="0.22"/>
    <circle cx="30" cy="1100" r="1040" stroke="#2190A4" stroke-width="14" opacity="0.17"/>
    <circle cx="30" cy="1100" r="1230" stroke="#2B5D86" stroke-width="12" opacity="0.13"/>
    <circle cx="30" cy="1100" r="1420" stroke="#2190A4" stroke-width="10" opacity="0.10"/>
    <circle cx="30" cy="1100" r="1610" stroke="#4A8ABD" stroke-width="8" opacity="0.08"/>
  </g>
</svg>
