    <rect x="1440" y="950" width="96" height="96" rx="22" opacity="0.20"/>
    <rect x="1570" y="820" width="96" height="96" rx="22" opacity="0.30"/>
    <rect x="1700" y="950" width="96" height="96" rx="22" opacity="0.22"/>
    <rect x="1830" y="820" width="96" height="96" rx="22" opacity="0.16"/>
  </g>
  <g fill="#1A3F5F" filter="url(#soft)">
    <rect x="1440" y="820" width="96" height="96" rx="22" opacity="0.38"/>
    <rect x="1440" y="690" width="96" height="96" rx="22" opacity="0.34"/>
    <rect x="1570" y="950" width="96" height="96" rx="22" opacity="0.42"/>
