    <circle cx="30" cy="1100" r="850" stroke="#4FBACD" stroke-width="20" opacity="0.33"/>
    <circle cx="30" cy="1100" r="1040" stroke="#2F97A9" stroke-width="17" opacity="0.26"/>
    <circle cx="30" cy="1100" r="1230" stroke="#4A8ABD" stroke-width="14" opacity="0.20"/>
    <circle cx="30" cy="1100" r="1420" stroke="#4FBACD" stroke-width="12" opacity="0.15"/>
    <circle cx="30" cy="1100" r="1610" stroke="#2F97A9" stroke-width="10" opacity="0.11"/>
  </g>
</svg>
