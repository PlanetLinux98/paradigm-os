<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>ParadigmOS wallpaper — Headland (light variant, rev 2): sweeping layered hills that melt into one another</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9EDF0"/>
      <stop offset="0.6" stop-color="#C2E0E7"/>
      <stop offset="1" stop-color="#ADD3DF"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.68" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#2190A4" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2190A4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A8ABD" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#4A8ABD" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="h2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B5D86" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2B5D86" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="h3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#176E7E" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#176E7E" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="h4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A3F5F" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#1A3F5F" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <path d="M0,600 C300,540 560,620 860,570 C1180,516 1420,600 1920,540 L1920,1080 L0,1080 Z"
        fill="url(#h1)" filter="url(#soft)"/>
  <path d="M0,710 C360,640 640,740 980,680 C1320,622 1560,720 1920,650 L1920,1080 L0,1080 Z"
        fill="url(#h2)" filter="url(#soft)"/>
  <path d="M0,830 C420,760 760,870 1120,800 C1440,740 1680,840 1920,780 L1920,1080 L0,1080 Z"
        fill="url(#h3)" filter="url(#soft)"/>
  <path d="M0,950 C480,880 880,990 1280,920 C1560,872 1760,950 1920,910 L1920,1080 L0,1080 Z"
        fill="url(#h4)" filter="url(#soft)"/>
</svg>
