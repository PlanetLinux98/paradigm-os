<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>ParadigmOS wallpaper — Shift (dark variant): drifting rounded tiles echoing the mark, one glowing teal escapee</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2233"/>
      <stop offset="0.55" stop-color="#153048"/>
      <stop offset="1" stop-color="#1A3F5F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.84" cy="0.6" r="0.55">
      <stop offset="0" stop-color="#2190A4" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#2190A4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washBlue" cx="0.1" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#4A8ABD" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4A8ABD" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#washBlue)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <g fill="#4A8ABD" filter="url(#soft)">
    <rect x="1180" y="820" width="96" height="96" rx="22" opacity="0.18"/>
    <rect x="1310" y="690" width="96" height="96" rx="22" opacity="0.22"/>
    <rect x="1310" y="820" width="96" height="96" rx="22" opacity="0.30"/>
    <rect x="1440" y="950" width="96" height="96" rx="22" opacity="0.22"/>
    <rect x="1570" y="820" width="96" height="96" rx="22" opacity="0.34"/>
    <rect x="1700" y="950" width="96" height="96" rx="22" opacity="0.26"/>
    <rect x="1830" y="820" width="96" height="96" rx="22" opacity="0.18"/>
  </g>
  <g fill="#7FB2DD" filter="url(#soft)">
    <rect x="1440" y="820" width="96" height="96" rx="22" opacity="0.34"/>
    <rect x="1440" y="690" width="96" height="96" rx="22" opacity="0.28"/>
    <rect x="1570" y="950" width="96" height="96" rx="22" opacity="0.38"/>
    <rect x="1700" y="820" width="96" height="96" rx="22" opacity="0.28"/>
  </g>
  <rect x="1585" y="620" width="104" height="104" rx="24" fill="#4FBACD" opacity="0.92"
        transform="rotate(14 1637 672)"/>
</svg>
