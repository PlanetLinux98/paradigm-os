<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>ParadigmOS wallpaper — Headland (dark variant): layered coastal hills at dusk with a teal afterglow</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1E2C"/>
      <stop offset="0.65" stop-color="#153349"/>
      <stop offset="1" stop-color="#1B4258"/>
    </linearGradient>
    <radialGradient id="afterglow" cx="0.68" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2190A4" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#2190A4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4FBACD" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#4FBACD" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#4FBACD" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#afterglow)"/>
  <path d="M0,600 C300,540 560,620 860,570 C1180,516 1420,600 1920,540 L1920,1080 L0,1080 Z"
        fill="#2F6DA0" opacity="0.42" filter="url(#soft)"/>
  <path d="M0,710 C360,640 640,740 980,680 C1320,622 1560,720 1920,650 L1920,1080 L0,1080 Z"
        fill="#24537D" opacity="0.6" filter="url(#soft)"/>
  <path d="M0,830 C420,760 760,870 1120,800 C1440,740 1680,840 1920,780 L1920,1080 L0,1080 Z"
        fill="#17455C" opacity="0.75" filter="url(#soft)"/>
  <path d="M0,952 C480,882 880,992 1280,922 C1560,874 1760,952 1920,912"
        fill="none" stroke="url(#rim)" stroke-width="4" filter="url(#soft2)"/>
  <path d="M0,950 C480,880 880,990 1280,920 C1560,872 1760,950 1920,910 L1920,1080 L0,1080 Z"
        fill="#102A40" opacity="0.9" filter="url(#soft)"/>
</svg>
