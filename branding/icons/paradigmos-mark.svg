<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>ParadigmOS mark — letter P formed from two shifted planes</title>
  <!-- Stem of the P: deep blue plane -->
  <rect x="34" y="20" width="22" height="80" rx="11" fill="#2B5D86"/>
  <!-- Bowl of the P: teal plane, rotated to suggest a shift in perspective.
       fill-rule evenodd keeps the counter (hole) transparent on any background. -->
  <path fill="#1B8A90" fill-opacity="0.94" fill-rule="evenodd"
        transform="rotate(10 71 45)"
        d="M63,20 h16 a17,17 0 0 1 17,17 v16 a17,17 0 0 1 -17,17 h-16 a17,17 0 0 1 -17,-17 v-16 a17,17 0 0 1 17,-17 Z
           M82,45 a11,11 0 1 1 -22,0 a11,11 0 1 1 22,0 Z"/>
</svg>
